<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thuê Xe - Gửi Thông Báo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Kích hoạt Notification Service</h2>
        <p>Mô phỏng luồng: Web Browser ➔ API Gateway ➔ Notification Service ➔ External Email Service.</p>
        
        <form id="emailForm">
            <div class="form-group">
                <label for="email">Email khách hàng:</label>
                <input type="email" id="email" placeholder="Nhập email của bạn..." required>
            </div>
            <div class="form-group">
                <label for="message">Nội dung thông báo:</label>
                <textarea id="message" rows="4" placeholder="Ví dụ: Đặt xe thành công..." required></textarea>
            </div>
            <button type="submit" id="sendBtn">Gửi Email</button>
        </form>

        <div id="statusMessage" class="status hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
